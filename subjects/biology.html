<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>

<header>
  <h2>Biology</h2>
  <a href="../index.html">Home</a>
</header>

<div class="container">
  <div id="chapters" class="grid"></div>
</div>

<script type="module">

import { db } from '../assets/js/app.js';
import { collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const q = query(
  collection(db, "chapters"),
  where("subject", "==", "Biology")
);

const snap = await getDocs(q);

let html = "";

snap.forEach(doc => {
  const d = doc.data();

  html += `
    <div class="card">
      <h3>${d.title}</h3>
      <a href="../chapter.html?id=${doc.id}">Open</a>
    </div>
  `;
});

chapters.innerHTML = html;

</script>

</body>
</html>
