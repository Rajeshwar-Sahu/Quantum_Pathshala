<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<header>
  <h2 id="title"></h2>
</header>

<div class="container">

  <div class="card">
    <p id="content"></p>
  </div>

  <div class="card">
    <iframe id="video" width="100%" height="300"></iframe>
  </div>

  <button onclick="complete()">Mark Complete</button>

</div>

<script type="module">

import { db, auth } from './assets/js/app.js';
import { doc, getDoc, updateDoc, arrayUnion }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

async function load() {
  const snap = await getDoc(doc(db, "chapters", id));
  const d = snap.data();

  title.innerText = d.title;
  content.innerText = d.content;
  video.src = d.video;
}

window.complete = async () => {
  await updateDoc(doc(db, "users", auth.currentUser.uid), {
    completed: arrayUnion(id)
  });

  alert("Completed");
};

load();

</script>

</body>
</html>
